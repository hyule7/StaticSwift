[build]
  command = "echo 'No build step required'"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

# Scheduled Functions
[functions."daily-followup"]
  schedule = "0 9 * * 1-5"

[functions."poll-support"]
  schedule = "*/5 * * * *"

# Redirects
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/client/:uuid"
  to = "/.netlify/functions/client-portal"
  status = 200

# Force HTTPS
[[redirects]]
  from = "http://staticswift.co.uk/*"
  to = "https://staticswift.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.staticswift.co.uk/*"
  to = "https://staticswift.co.uk/:splat"
  status = 301
  force = true

# Custom headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
