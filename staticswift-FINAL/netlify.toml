[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"

[functions."daily-followup"]
  schedule = "0 9 * * 1-5"

[functions."poll-support"]
  schedule = "*/5 * * * *"

# Ping sitemaps after every successful deploy
[functions."ping-sitemaps"]
  # Called automatically via deploy hook set up in Netlify UI

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/client/*"
  to = "/.netlify/functions/client-portal"
  status = 200

[[redirects]]
  from = "http://staticswift.co.uk/*"
  to = "https://staticswift.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.staticswift.co.uk/*"
  to = "https://staticswift.co.uk/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.staticswift.co.uk/*"
  to = "https://staticswift.co.uk/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control = "no-store"
